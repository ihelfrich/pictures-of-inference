project:
  type: book
  output-dir: build

book:
  title: "Pictures of Inference"
  subtitle: "A Visual Course in Statistics, Calculus, and Econometrics"
  author:
    - name: "Dr. Ian Helfrich"
    - name: "Dr. Elizaveta Gonchar"
  date: last-modified
  date-format: "MMMM YYYY"
  chapters:
    - index.qmd
    - part: "Front matter"
      chapters:
        - prose/front/field-guide.qmd
        - prose/front/about.qmd
    - part: "Part I — How to See"
      chapters:
        - prose/part1/01-numbers-on-the-page.qmd
        - prose/part1/02-probability-as-area.qmd
        - prose/part1/03-shapes-of-data.qmd
        - prose/part1/04-grammar-of-graphics.qmd
        - prose/part1/05-center-spread-shape.qmd
        - prose/part1/06-lying-with-charts.qmd
        - prose/part1/07-underused-visualizations.qmd
        - prose/part1/08-visualizing-uncertainty.qmd
        - prose/part1/09-reading-equations.qmd
        - prose/part1/10-reading-tables.qmd
    - part: "Practice Workbook"
      chapters:
        - prose/workbook/wb01-distributions.qmd
        - prose/workbook/wb02-reading-regressions.qmd
        - prose/workbook/wb03-hypothesis-testing.qmd
    - part: "Tools"
      chapters:
        - prose/tools/chart-truth-lab.qmd
  search: true
  page-navigation: true
  reader-mode: true
  page-footer:
    left: |
      © 2026 Ian Helfrich and Elizaveta Gonchar. CC-BY-SA 4.0.
    right: |
      Built with [Quarto](https://quarto.org).

bibliography: references.bib
csl: https://www.zotero.org/styles/chicago-author-date

highlight-style: a11y

format:
  html:
    theme: [cosmo, assets/theme.scss]
    css: assets/styles.css
    toc: true
    toc-depth: 3
    toc-expand: 2
    fig-format: png
    fig-dpi: 300
    fig-width: 9
    fig-height: 5.5
    fig-align: center
    fig-cap-location: bottom
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true
    citations-hover: true
    crossrefs-hover: true
    link-external-newwindow: true
    html-math-method: katex
    include-in-header:
      - text: |
          <script>
          window.MathJax = {
            tex: {
              macros: {
                E: ["\\operatorname{\\mathbb{E}}"],
                Var: ["\\operatorname{Var}"],
                Cov: ["\\operatorname{Cov}"],
                Corr: ["\\operatorname{Corr}"],
                bx: ["\\boldsymbol{x}"],
                by: ["\\boldsymbol{y}"],
                bbeta: ["\\boldsymbol{\\beta}"],
                bvarepsilon: ["\\boldsymbol{\\varepsilon}"],
                bX: ["\\boldsymbol{X}"],
                bY: ["\\boldsymbol{Y}"],
                bI: ["\\boldsymbol{I}"]
              }
            }
          };
          </script>
  pdf:
    documentclass: scrbook
    classoption: [11pt, twoside, openany]
    geometry:
      - inner=1.2in
      - outer=1.0in
      - top=1.0in
      - bottom=1.0in
    include-in-header: prose/_quarto-preamble.tex
    fig-format: pdf
    fig-width: 7
    fig-height: 4.5
    fig-align: center
    fig-cap-location: bottom

execute:
  freeze: auto
