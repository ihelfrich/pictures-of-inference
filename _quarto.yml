project:
  type: book
  output-dir: build

book:
  title: "Pictures of Inference"
  subtitle: "A Visual Course in Statistics, Calculus, and Econometrics"
  author:
    - name: "Dr. Ian Helfrich"
    - name: "Dr. Elizaveta Gonchar"
  date: last-modified
  date-format: "MMMM YYYY"
  chapters:
    - index.qmd
    - part: "How to See"
      chapters:
        - prose/part1/01-numbers-on-the-page.qmd
        - prose/part1/02-probability-as-area.qmd
        - prose/part1/03-shapes-of-data.qmd
        - prose/part1/04-grammar-of-graphics.qmd
        - prose/part1/05-center-spread-shape.qmd
        - prose/part1/06-lying-with-charts.qmd
        - prose/part1/07-underused-visualizations.qmd
        - prose/part1/08-visualizing-uncertainty.qmd
        - prose/part1/09-reading-equations.qmd
        - prose/part1/10-reading-tables.qmd
  search: true
  page-navigation: true

highlight-style: a11y

format:
  html:
    theme:
      light: [cosmo, assets/theme.scss]
      dark:  [cosmo, assets/dark.scss]
    css: assets/styles.css
    respect-user-color-scheme: true
    toc: true
    toc-depth: 3
    toc-location: right
    fig-format: svg
    fig-width: 9
    fig-height: 5.5
    fig-align: center
    fig-cap-location: bottom
    code-copy: true
    code-overflow: wrap
    code-link: true
    smooth-scroll: true
    citations-hover: true
    crossrefs-hover: true
    link-external-newwindow: true
    title-block-banner: true
    html-math-method: katex
    include-in-header:
      - text: |
          <meta name="color-scheme" content="light dark">
          <script>
          window.MathJax = {
            tex: {
              macros: {
                E: ["\\operatorname{\\mathbb{E}}"],
                Var: ["\\operatorname{Var}"],
                Cov: ["\\operatorname{Cov}"],
                Corr: ["\\operatorname{Corr}"],
                bx: ["\\boldsymbol{x}"],
                by: ["\\boldsymbol{y}"],
                bbeta: ["\\boldsymbol{\\beta}"],
                bvarepsilon: ["\\boldsymbol{\\varepsilon}"],
                bX: ["\\boldsymbol{X}"],
                bY: ["\\boldsymbol{Y}"],
                bI: ["\\boldsymbol{I}"]
              }
            }
          };
          </script>
  pdf:
    documentclass: scrbook
    classoption: [11pt, twoside, openany]
    geometry:
      - inner=1.2in
      - outer=1.0in
      - top=1.0in
      - bottom=1.0in
    include-in-header: prose/_quarto-preamble.tex
    fig-format: pdf
    fig-width: 7
    fig-height: 4.5
    fig-align: center
    fig-cap-location: bottom

execute:
  freeze: auto
