project:
  type: book
  output-dir: build

book:
  title: "Pictures of Inference"
  subtitle: "A Visual Course in Statistics, Calculus, and Econometrics"
  author:
    - name: "Dr. Ian Helfrich"
    - name: "Dr. Elizaveta Gonchar"
  date: last-modified
  date-format: "MMMM YYYY"
  chapters:
    - index.qmd
    - part: "How to See"
      chapters:
        - prose/part1/01-numbers-on-the-page.qmd
  search: true
  page-navigation: true

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    toc-depth: 3
    fig-format: svg
    fig-width: 7
    fig-height: 4
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true
    citations-hover: true
    crossrefs-hover: true
    include-in-header:
      text: |
        <script>
        window.MathJax = {
          tex: {
            macros: {
              E: ["\\operatorname{\\mathbb{E}}"],
              Var: ["\\operatorname{Var}"],
              Cov: ["\\operatorname{Cov}"],
              Corr: ["\\operatorname{Corr}"],
              bx: ["\\boldsymbol{x}"],
              by: ["\\boldsymbol{y}"],
              bbeta: ["\\boldsymbol{\\beta}"],
              bvarepsilon: ["\\boldsymbol{\\varepsilon}"],
              bX: ["\\boldsymbol{X}"],
              bY: ["\\boldsymbol{Y}"],
              bI: ["\\boldsymbol{I}"]
            }
          }
        };
        </script>
  pdf:
    documentclass: scrbook
    classoption: [11pt, twoside, openany]
    geometry:
      - inner=1.2in
      - outer=1.0in
      - top=1.0in
      - bottom=1.0in
    include-in-header: prose/_quarto-preamble.tex
    fig-format: pdf
    fig-width: 6
    fig-height: 4

execute:
  freeze: auto
